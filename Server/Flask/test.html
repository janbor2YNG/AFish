<!-- Upload a new YAML -->
<input type="file" id="yamlInput" accept=".yml,.yaml">
<button onclick="uploadYaml()">Upload</button>

<!-- List + select active config -->
<select id="configSelect"></select>
<button onclick="setActive()">Set as Active</button>

<script>
async function uploadYaml() {
    const file = document.getElementById('yamlInput').files[0];
    const formData = new FormData();
    formData.append('yaml_file', file);

    const res = await fetch('/upload-yaml', { method: 'POST', body: formData });
    const data = await res.json();
    alert(data.message);
    loadConfigs(); // refresh list
}

async function loadConfigs() {
    const res = await fetch('/list-configs');
    const data = await res.json();
    const select = document.getElementById('configSelect');
    select.innerHTML = data.files.map(f =>
        `<option ${f === data.active ? 'selected' : ''}>${f}</option>`
    ).join('');
}

async function setActive() {
    const filename = document.getElementById('configSelect').value;
    const res = await fetch('/set-active-config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename })
    });
    const data = await res.json();
    alert(data.message);
}

loadConfigs(); // load on page start
</script>
